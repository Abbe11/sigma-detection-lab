title: LSASS Memory Access for Credential Dumping
id: 8a1f2c3d-2222-4aaa-bbbb-000000000002
status: experimental
description: Detects a process opening a handle to lsass.exe with access rights commonly used to read process memory, a hallmark of credential dumping tools like Mimikatz.
references:
    - https://attack.mitre.org/techniques/T1003/001/
author: Abbe
date: 2026-06-10
tags:
    - attack.credential-access
    - attack.t1003.001
logsource:
    category: process_access
    product: windows
detection:
    selection:
        TargetImage|endswith: \lsass.exe
        GrantedAccess:
            - 0x1010
            - 0x1410
            - 0x1438
            - 0x143a
            - 0x1fffff
    condition: selection
falsepositives:
    - Some legitimate security and monitoring tools access lsass and may need tuning out by SourceImage.
level: high
